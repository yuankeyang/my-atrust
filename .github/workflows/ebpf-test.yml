name: eBPF Tests

on:
  push:
    branches: [main]
    paths:
      - "eBPF/**"
      - "trust-core/**"
  pull_request:
    paths:
      - "eBPF/**"
      - "trust-core/**"
  schedule:
    # Weekly eBPF kernel matrix test
    - cron: "0 0 * * 0"

env:
  CARGO_TERM_COLOR: always

jobs:
  ebpf-build:
    name: eBPF Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Install aya-build
        run: cargo install aya-build

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build eBPF
        run: |
          cd eBPF/interceptor
          cargo ebpf build || cargo build --release

  ebpf-test-matrix:
    name: eBPF Kernel Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kernel: ["5.10", "5.15", "6.1", "6.6"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run eBPF tests (kernel ${{ matrix.kernel }})
        run: |
          if [ -d eBPF/interceptor ]; then
            cd eBPF/interceptor
            cargo test -- --test-threads=1 || echo "eBPF tests require kernel support"
          fi
        continue-on-error: true

  ebpf-fallback-test:
    name: eBPF Fallback Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Test fallback path
        run: |
          if [ -d trust-core ]; then
            cd trust-core
            cargo test fallback -- --test-threads=1 || echo "Fallback tests optional"
          fi
        continue-on-error: true

      - name: Test without CAP_BPF
        run: |
          if [ -d trust-core ]; then
            cd trust-core
            cargo test --lib -- --test-threads=1
          fi
        continue-on-error: true
