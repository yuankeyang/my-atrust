name: Contract Drift

on:
  schedule:
    # Run daily at 3am
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  contract-drift:
    name: Runtime Contract Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build trust-ctl
        run: cargo build --release -p trust-ctl

      - name: Start trust-ctl in background
        run: |
          cargo run --release -p trust-ctl &
          echo $! > /tmp/atrusted-pid
          sleep 5

      - name: Check if service started
        run: curl -f http://localhost:8080/health || (echo "Service failed to start"; kill $(cat /tmp/atrusted-pid); exit 1)

      - name: Install schemathesis
        run: pip install schemathesis

      - name: Run Schemathesis
        run: |
          schemathesis run openapi.yaml \
            --url http://localhost:8080 \
            --checks all \
            --verbose || true

      - name: Stop trust-ctl
        run: kill $(cat /tmp/atrusted-pid) 2>/dev/null || true
