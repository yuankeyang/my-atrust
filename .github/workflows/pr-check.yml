name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check dependencies
        run: cargo check --all-targets

  openapi:
    name: OpenAPI Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install spectral
        run: npm install -g spectral-cli

      - name: Spectral lint
        run: spectral lint openapi.yaml

      - name: Validate config schema
        run: |
          if [ -f config.schema.json ] && [ -f config.example.json ]; then
            npm install -g ajv-cli ajv-formats
            ajv validate -s config.schema.json -d config.example.json --strict=false || true
          fi

  protobuf:
    name: Protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Check protobuf
        run: |
          if [ -f policy.proto ]; then
            protoc --lint policy.proto
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib -- --test-threads=4
