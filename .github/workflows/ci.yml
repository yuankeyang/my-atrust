name: CI

on:
  push:
    branches: [main]
  schedule:
    # Nightly fuzz run - full 2h fuzz
    - cron: "0 2 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check licenses and vulnerabilities
        run: cargo deny check

  fuzz-smoke:
    name: Fuzz Smoke (60s)
    runs-on: ubuntu-latest
    # Only run on PR/push, not on schedule (schedule is full fuzz)
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz smoke
        run: |
          cd trust-core
          cargo fuzz run policy_parse -- -max_total_time=60 || true
        continue-on-error: true

  snapshot:
    name: Snapshot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Update snapshots
        run: cargo insta test --all -- -u
        env:
          UPDATE_EXPECT: 1

      - name: Check for snapshot changes
        run: git diff --exit-code || (echo "Snapshot changes detected. Review and commit them."; exit 1)
